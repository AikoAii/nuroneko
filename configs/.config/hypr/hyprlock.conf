# ==========================================
# HYPRLOCK - MINIMALIST MODERN DAILY WITH LINE
# ==========================================

background {
    monitor =
    path = ~/.local/share/wallpapers/current
    
    # Blur standar yang nyaman di mata, tidak terlalu gelap maupun silau
    blur_passes = 2
    blur_size = 4
    noise = 0.015
    contrast = 0.9
    brightness = 0.8
}

# TIME (Jam & Menit - Standar, Tegas, Mudah Dibaca)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(205, 214, 244, 1.0)               # Catppuccin Text (Putih Bersih)
    font_size = 80
    font_family = JetBrainsMono Nerd Font Bold      # Tebal biasa biar jelas
    position = 0, 110
    halign = center
    valign = center
}

# DATE (Hari, Tanggal Bulan - Format Kasual)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    color = rgba(166, 173, 200, 1.0)               # Catppuccin Subtext1 (Abu-abu lembut)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 45                               # Jarak disesuaikan di bawah jam
    halign = center
    valign = center
}

# DECORATIVE LINE (Garis horizontal tipis pembatas dari versi elit)
label {
    monitor =
    text = |─────────────────────────────────────────────|
    color = rgba(147, 153, 178, 0.3)               # Garis abu-abu samar agar tidak terlalu mencolok
    font_size = 10
    position = 0, 5                                # Diposisikan manis tepat di atas kolom input
    halign = center
    valign = center
}

# INPUT FIELD (Kolom Password Kotak Tumpul Transparan)
input-field {
    monitor =
    size = 260, 42
    outline_thickness = 2
    dots_size = 0.25 
    dots_spacing = 0.3 
    dots_center = true
    
    # Warna border tipis biru khas Catppuccin
    outer_color = rgba(137, 180, 250, 0.6)         # Biru semi-transparan (60%)
    inner_color = rgba(30, 30, 46, 0.6)            # Hitam Catppuccin transparan
    font_color = rgba(205, 214, 244, 1.0)
    
    fade_on_empty = false 
    
    placeholder_text = <span foreground="##a6adc8">Enter Password...</span>
    hide_input = false
    
    position = 0, -60
    halign = center
    valign = center
}
