# ---------------------------------------------------------------------------------------------

# =========================================================
# CORE BEHAVIOR
# =========================================================

windowrule = match:class .*, suppress_event maximize

windowrule = match:class ^$, match:title ^$, match:xwayland true, match:float true, no_focus on

windowrule = match:xwayland true, match:float true, no_blur on


# =========================================================
# GLOBAL FLOATING LAYOUT
# =========================================================

# consistent floating geometry

windowrule = match:float true, center on
windowrule = match:float true, size 45% 45%


# =========================================================
# OPACITY
# =========================================================

windowrule = match:class ^(firefox|zen-browser|chromium|brave)$, opacity 1 1

windowrule = match:class ^(nemo|org.gnome.FileRoller|qt5ct|qt6ct)$, opacity 0.90 0.90


# =========================================================
# PICTURE IN PICTURE
# =========================================================

windowrule = match:title ^([Pp]icture-in-[Pp]icture).*$, float on

windowrule = match:title ^([Pp]icture-in-[Pp]icture).*$, pin on

windowrule = match:title ^([Pp]icture-in-[Pp]icture).*$, keep_aspect_ratio on

windowrule = match:title ^([Pp]icture-in-[Pp]icture).*$, size 25% 25%

windowrule = match:title ^([Pp]icture-in-[Pp]icture).*$, move 75% 74%


# =========================================================
# FLOATING APPS
# =========================================================

windowrule = match:class ^(blueman-manager|nm-connection-editor)$, float on

windowrule = match:class ^(qt5ct|qt6ct|nwg-look)$, float on

windowrule = match:class ^(file-roller|org.gnome.FileRoller)$, float on

windowrule = match:class ^(qalculate-qt|gnome-calculator)$, float on

windowrule = match:class ^(org.pulseaudio.pavucontrol|com.saivert.pwvucontrol)$, float on



# =========================================================
# FLOATING SIZE OVERRIDES
# =========================================================

# terminals

windowrule = match:class ^(kitty|Alacritty|foot|org.wezfurlong.wezterm)$, size 30% 30%

# calculator

windowrule = match:class ^(qalculate-qt|gnome-calculator)$, size 28% 52%

# archive manager

windowrule = match:class ^(file-roller|org.gnome.FileRoller)$, size 60% 72%

# settings / theme tools

windowrule = match:class ^(qt5ct|qt6ct|nwg-look)$, size 55% 72%

# audio mixer

windowrule = match:class ^(org.pulseaudio.pavucontrol|com.saivert.pwvucontrol)$, size 52% 50%


# =========================================================
# DIALOGS
# =========================================================

windowrule = match:title ^(Open|Save As|Authentication Required|Choose Files|Open File)$, float on

windowrule = match:title ^(Confirm to replace files|File Operation Progress|File Upload).*$, float on

windowrule = match:class ^(.*dialog.*)$, float on

windowrule = match:title ^(.*dialog.*)$, float on

# slightly smaller dialogs

windowrule = match:class ^(xdg-desktop-portal-gtk)$, size 45% 55%


# =========================================================
# PORTALS
# =========================================================

windowrule = match:class ^(org.freedesktop.impl.portal.desktop.hyprland)$, float on

windowrule = match:class ^(org.freedesktop.impl.portal.desktop.gtk)$, float on

windowrule = match:class ^([Xx]dg-desktop-portal-gtk)$, float on


# =========================================================
# SCRATCHPAD
# =========================================================

windowrule = match:class ^(scratchpad)$, workspace special:magic


# =========================================================
# POPUP UI
# =========================================================

windowrule = match:class ^(btop-popup|fastfetch-popup)$, float on

windowrule = match:class ^(btop-popup|fastfetch-popup)$, center on

windowrule = match:class ^(btop-popup)$, size 60% 70%

windowrule = match:class ^(btop-popup)$, opacity 0.95 0.95

windowrule = match:class ^(fastfetch-popup)$, no_blur on


# =========================================================
# LAYER RULES
# =========================================================

# rofi

layerrule = match:namespace rofi, blur true

layerrule = match:namespace rofi, ignore_alpha 0

# notifications

layerrule = match:namespace notifications, blur true

layerrule = match:namespace notifications, ignore_alpha 0

# swaync

layerrule = match:namespace swaync-notification-window, blur true

layerrule = match:namespace swaync-notification-window, ignore_alpha 0

layerrule = match:namespace swaync-control-center, blur true

layerrule = match:namespace swaync-control-center, ignore_alpha 0

# waybar

layerrule = match:namespace waybar, blur true

windowrule = match:class ^(kitty|Alacritty|foot|org.wezfurlong.wezterm)$, size 58% 52%

windowrule = match:class ^(kitty|Alacritty|foot|org.wezfurlong.wezterm)$, opacity 0.96 0.96
