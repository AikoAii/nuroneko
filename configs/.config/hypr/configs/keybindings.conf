# -----------------------------------------------------------------------------

# variables

$mod = SUPER


# window management

bind = $mod, Q, killactive

bind = $mod, SPACE, exec, hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 55% 55% && hyprctl dispatch moveactive exact 15% 15%
bind = ALT, RETURN, fullscreen

bind = $mod, P, pseudo
bind = $mod, J, layoutmsg, togglesplit
bind = $mod, G, togglegroup

bind = $mod, TAB, workspace, previous
bind = $mod, U, focusurgentorlast


# applications

bind = $mod, RETURN, exec, $terminal

bind = $mod, D, exec, $menu

bind = $mod, Z, exec, $browser
bind = $mod, E, exec, $fileManager

bind = $mod, C, exec, $editor
bind = $mod, I, exec, $notes

bind = $mod, A, exec, pwvucontrol

bind = CTRL SHIFT, Escape, exec, $systemMonitor


# wallpapers

bind = $mod, W, exec, wallpaper-select.sh

bind = $mod SHIFT, W, exec, wallpaper-random.sh


# clipboard

bind = $mod, V, exec, $clipboard

bind = $mod SHIFT, V, exec, $clipboardcl

# SCREENSHOTS
bind = , Print, exec, screenshot.sh full
bind = SHIFT, Print, exec, screenshot.sh select

# OCR
bind = $mod, O, exec, ocr-copy.sh


# session & system

bind = $mod SHIFT, L, exec, $lock

bind = $mod, ESCAPE, exec, $powermenu

bind = $mod CTRL, R, exec, hyprctl reload

bind = $mod, B, exec, pkill waybar || waybar


# notifications

bind = $mod, N, exec, swaync-client -t

bind = $mod SHIFT, N, exec, swaync-client -cp

bind = $mod CTRL, N, exec, swaync-client -C


# window focus

bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d


# workspaces

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10


# special workspace

bind = $mod, S, togglespecialworkspace, magic

bind = $mod SHIFT, S, movetoworkspace, special:magic

bind = $mod, T, exec, [workspace special:magic] $terminal --class scratchpad

bind = $mod, M, exec, [workspace special:magic] $music


# mouse

bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow


# media keys

binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+ && swayosd-client --output-volume raise

binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && swayosd-client --output-volume lower

bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && swayosd-client --output-volume mute-toggle

bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle && swayosd-client --input-volume mute-toggle

binde = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+ && swayosd-client --brightness raise

binde = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%- && swayosd-client --brightness lower

bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause
bind = , XF86AudioPrev, exec, playerctl previous


# utilities

bind = $mod, PERIOD, exec, $rofimoji

bind = $mod, SLASH, exec, $keybinds

bind = $mod, K, exec, hyprpicker -a


# power profiles

bind = $mod, F1, exec, ~/.config/hypr/scripts/save-power.sh

bind = $mod, F2, exec, ~/.config/hypr/scripts/balance.sh

bind = $mod, F3, exec, ~/.config/hypr/scripts/daily.sh

bind = $mod, F4, exec, ~/.config/hypr/scripts/performance.sh


# power controls

bind = $mod CTRL SHIFT, L, exec, $lock

bind = $mod CTRL SHIFT, P, exec, $suspend

bind = $mod CTRL SHIFT, R, exec, $reboot

bind = $mod CTRL SHIFT, Q, exit

bind = $mod CTRL SHIFT, S, exec, $shutdown


# relative workspace

bind = $mod CTRL, right, workspace, r+1
bind = $mod CTRL, left, workspace, r-1
bind = $mod CTRL, down, workspace, empty


# resize windows

binde = $mod SHIFT, right, resizeactive, 30 0
binde = $mod SHIFT, left, resizeactive, -30 0

binde = $mod SHIFT, up, resizeactive, 0 -30
binde = $mod SHIFT, down, resizeactive, 0 30


# move windows

bind = $mod CTRL SHIFT, right, movewindow, r
bind = $mod CTRL SHIFT, left, movewindow, l

bind = $mod CTRL SHIFT, up, movewindow, u
bind = $mod CTRL SHIFT, down, movewindow, d

# HYPRSHADE

# warm / night filter

bind = $mod, F9, exec, hyprshade on blue-light-filter

# vibrance

bind = $mod, F10, exec, hyprshade on vibrance

# disable all shaders

bind = $mod SHIFT, F10, exec, hyprshade off
