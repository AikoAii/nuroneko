# dbus

exec-once = dbus-update-activation-environment --all

# audio

#exec-once = pipewire

#exec-once = pipewire-pulse

#exec-once = wireplumber


# wallpaper

exec-once = awww-daemon --format xrgb

exec-once = wallpaper-set "$(readlink -f ~/.local/share/wallpapers/current)"


# clipboard

exec-once = wl-paste --type text --watch cliphist store

exec-once = wl-paste --type image --watch cliphist store


# ui

exec-once = swaync

exec-once = swayosd-server

exec-once = waybar


# applets

exec-once = nm-applet

exec-once = blueman-applet

exec-once = niri-screen-time -daemon


# session

exec-once = hypridle

# exec-once = hyprswitch init \
#   --size-factor 4 \
#   --show-title true \
#   --custom-css ~/.config/hyprswitch/style.css &

exec-once = kanshi


# security

exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
